# Official GitHub Pages flow: build static site → upload artifact → deploy-pages.
# Repo settings → Pages → Source: "GitHub Actions".
#
# For https://<user>.github.io/<repo>/  we set BASE_PATH=/<repo>/ so Vite + public/ assets resolve.
# User site repo named <owner>.github.io → BASE_PATH is / (override with repo variable PAGES_BASE_PATH).
# Optional: Settings → Variables → PAGES_BASE_PATH (e.g. /my-repo/ or / for apex site).
# Secrets for build: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, optional VITE_RGC_BACKEND_URL

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Pages base path
        id: pages_base
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "path=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages_base.outputs.path }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RGC_BACKEND_URL: ${{ secrets.VITE_RGC_BACKEND_URL }}

      # SPA: GitHub Pages serves 404.html on unknown paths so client routes work on refresh/deep link
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
